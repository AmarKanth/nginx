# renew_before_expiry = 30 days
version = 2.10.0
archive_dir = /etc/letsencrypt/archive/practicepurpose.xyz
cert = /etc/letsencrypt/live/practicepurpose.xyz/cert.pem
privkey = /etc/letsencrypt/live/practicepurpose.xyz/privkey.pem
chain = /etc/letsencrypt/live/practicepurpose.xyz/chain.pem
fullchain = /etc/letsencrypt/live/practicepurpose.xyz/fullchain.pem

# Options used in the renewal process
[renewalparams]
account = 8b58124542d2fe751e39b5fee2d1cfc8
authenticator = webroot
webroot_path = /var/www/certbot,
server = https://acme-v02.api.letsencrypt.org/directory
key_type = ecdsa
[[webroot_map]]
practicepurpose.xyz = /var/www/certbot
